# Surface Manifest registry message catalog (slice 449).
#
# Resolves Presentation.labelKey / Presentation.descriptionKey for every
# Surface entry shipped by core or vendor catalogs. Mirrors the layout of
# registry-resource.en.properties / registry-diagnostic.en.properties.
#
# V1 ships one entry — slice 449 phase 4 — the Library calibration target.
# Future Surface entries follow the same
# `registry-surface.<surface-id-without-namespace>.{label|description}`
# convention.

registry-surface.library-surface.label=Library
registry-surface.library-surface.description=Watched folders and exclude patterns. Add or remove sources, trigger a full reindex, preview exclude-pattern matches before applying them.

# Slice 451 phase 9 — Help surface (FAQ + shortcuts + diagnostics export).
registry-surface.help-surface.label=Help
registry-surface.help-surface.description=Diagnostics export and local-first transparency. FAQ, keyboard shortcuts, and privacy info.

# 569 §19 Phase 4 — Presentation gallery (style variations / skins).
registry-surface.presentation-gallery-surface.label=Skins
registry-surface.presentation-gallery-surface.description=Style variations and skins for the app: preview, apply, revert, and import or export an inert presentation declaration.

# 569 §19 Phase 6 — Presentation editor (author a declaration visually).
registry-surface.presentation-editor-surface.label=Editor
registry-surface.presentation-editor-surface.description=Compose a presentation declaration from the closed component palette with a live preview and inline conformance feedback.

# Slice 452 phase 9 — Brain (LLM install / runtime / inference mode).
registry-surface.brain-surface.label=AI Brain
registry-surface.brain-surface.description=Configure local language models. Install AI models, switch inference mode, manage GPU runtime variants, edit LLM settings, and import offline AI packs.

# Slice 453 phase 9 — Agent (chat + tool approval + sessions).
registry-surface.agent-surface.label=Agent
registry-surface.agent-surface.description=Chat-based interface for the agentic tool execution system. Approve / reject tool calls, resume past sessions, and review history.

# Slice 454 phase 9 — Settings (theme / keyboard / autostart / reset).
registry-surface.settings-surface.label=Settings
registry-surface.settings-surface.description=User preferences. Theme, high-contrast, default keyboard action, desktop autostart, reset, delete all data.
registry-surface.security-surface.label=Security & Privacy
registry-surface.security-surface.description=Chat encryption setup, passphrase, recovery key, encrypted backup/import, auto-lock, and what's protected at rest.

# Slice 455 phase 9 — Browse (file tree of watched roots).
registry-surface.browse-surface.label=Browse
registry-surface.browse-surface.description=Tree view of indexed folders and files. Expand watched roots to navigate, filter by name, click a file to open or copy its path.

# Slice 456 phase 9 — Health (system status + quick actions + events).
registry-surface.health-surface.label=System Health
registry-surface.health-surface.description=Monitor index and API status. Stats grid (files / size / memory / queue), connection + GPU panels, quick actions (reindex, restart worker, clear failed, export diagnostics, index GC, bulk reindex), failed-files panel, recent events.

# Tempdoc 571 §11 / 578 — the System hub (hosts Health · Logs · Activity as tabs).
registry-surface.system-surface.label=System
registry-surface.system-surface.description=What the system is and was doing — health and status, the live log stream, and the operation audit, in one place.

# Slice 463 — Search HUD.
registry-surface.search-surface.label=Search
registry-surface.search-surface.description=Search across indexed files. Type to search; click a result to preview in the inspector.

# Slice 3a.2.e — Logs surface (HeadLog DiagnosticChannel consumer).
registry-surface.logs-surface.label=Logs
registry-surface.logs-surface.description=Live operator log tail (Head process). Filter by severity and sub-category; substring search; pause/resume the live stream.

# Slice 486 F15-narrow — Activity surface (OperationHistory Resource consumer).
registry-surface.activity-surface.label=Activity
registry-surface.activity-surface.description=Recent operation history (last ~200 entries). Shows what the agent and the system have recently done — invocations, results, and outcomes. Live ring buffer; not a durable archive.
registry-surface.system-self-view.label=Now
registry-surface.system-self-view.description=What the system is doing right now — live indexing jobs and AI install/pack, ordered by importance, with a confident idle state when nothing is running.

# Slice 491 §9.D Phase E (C3) — Ask surface (RAG Q&A grounded by indexed documents).
registry-surface.ask-surface.label=Ask
registry-surface.ask-surface.description=Ask questions about your indexed documents. The local LLM answers using retrieved-augmented generation with inline citations to the source sentences.

# Slice 496 §3.B — FreeChat surface (persistent plain conversation).
registry-surface.free-chat-surface.label=Chat
registry-surface.free-chat-surface.description=Talk to the local LLM. A persistent conversation that remembers your messages across turns. No tools, no documents — just a direct chat.

# Slice 497 — Unified Chat (consolidates Ask + Chat + Extract).
registry-surface.unified-chat-surface.label=Chat
registry-surface.unified-chat-surface.description=Unified conversation surface. Ask questions about your documents, chat with the local LLM, or extract structured data — all from one place.

# Slice 496 §3.C — Extract surface (structured JSON output).
registry-surface.extract-surface.label=Extract
registry-surface.extract-surface.description=Produce structured JSON output from a prompt and a JSON schema. The local LLM retries automatically if the output doesn't match the schema.

# Tempdoc 583 §D.3b — API explorer (read-only route-manifest projection).
registry-surface.api-explorer-surface.label=API Explorer
registry-surface.api-explorer-surface.description=The live HTTP API surface, grouped by domain. A read-only view of every registered route and the runtime capability (worker / inference) each requires, with live availability.

# Tempdoc 586 P-4 — Governance dashboard (DEVELOPER; read-only discipline-gate kernel projection).
registry-surface.governance-surface.label=Governance
registry-surface.governance-surface.description=Read-only governance dashboard. A developer view of the discipline-gate kernel — gate state, the exception ceiling, and class-size debt — projected from the build's structural invariants.

# Tempdoc 586 P-4 — Memory (learned facts the assistant keeps; the "what it knows" half).
registry-surface.memory-surface.label=Memory
registry-surface.memory-surface.description=What the assistant has learned. Inspect and forget the durable facts the AI keeps about your documents — the "what it knows" half, distinct from recent activity.
