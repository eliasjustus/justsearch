# i18n catalog for inference-runtime failure wire codes (tempdoc 518 Appendix F W2.3).
# Served at GET /api/messages/inference-failures/en via MessageCatalogController.
#
# Per-wireCode key shape:
#   inference-failures.<wireCode>=<user-facing message>
#
# Where <wireCode> is the snake_case value returned by InferenceFailure.wireCode() —
# emitted on the /api/inference/failures payload and on the failure record carried by
# error envelopes from /api/inference/mode (etc.). The frontend looks up
# "inference-failures." + failure.wireCode for display.
#
# Coverage contract: every distinct wireCode across StartupCode / HealthCode /
# ConfigCode / TransitionCode must have an entry here. Enforced by
# InferenceFailureMessagesContractTest.
#
# Origin (which code enum each entry comes from is shown in comments for grep-ability).
# Audit verdict: tempdoc 518 Appendix E §E.9 (modified).

# === StartupCode ============================================================
inference-failures.insufficient_vram=Not enough GPU memory to load the model. Try a smaller model or close other GPU apps.
inference-failures.missing_dll=AI engine is missing a required component. Reinstall the AI runtime from the AI panel.
inference-failures.executable_not_found=AI engine runtime is not installed. Install AI from the AI panel.
inference-failures.process_exited=AI engine stopped unexpectedly during startup. Check logs for details.
inference-failures.port_allocation_failed=No free port available for the AI engine. Close other AI services and try again.
inference-failures.external_server_policy_blocked=External AI servers are blocked by administrator policy.

# === HealthCode =============================================================
inference-failures.health_timeout=AI engine did not respond in time. Try restarting it.
inference-failures.health_interrupted=Health check was interrupted. The AI engine may be restarting.
inference-failures.connection_refused=AI engine refused the connection. It may be starting up or unavailable.
inference-failures.process_died=AI engine crashed. It will restart automatically; see diagnostics if the issue persists.

# === ConfigCode =============================================================
inference-failures.invalid_config=AI configuration is invalid. Check the model path and context length in Settings.
inference-failures.config_required=AI configuration is missing. Open Settings to choose a model.
inference-failures.already_transitioning=AI is busy switching modes. Please wait and try again.
inference-failures.external_server_conflict=An external AI server is connected. Detach it before changing this setting.

# === TransitionCode =========================================================
inference-failures.online_start_failed=Failed to switch AI to online mode. See diagnostics for the underlying cause.
inference-failures.indexing_start_failed=Failed to switch to indexing mode. Check that the worker is healthy.
inference-failures.config_apply_failed=Failed to apply the new AI configuration. Previous configuration restored.
inference-failures.interrupted=AI mode change was interrupted. Try again.

# === Shared UNKNOWN =========================================================
# Used by StartupCode.UNKNOWN, HealthCode.UNKNOWN, and ConfigCode.UNKNOWN.
inference-failures.unknown=AI engine encountered an unexpected error. See diagnostics for details.
