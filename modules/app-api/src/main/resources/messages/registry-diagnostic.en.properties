# DiagnosticChannel registry message catalog (slice 448).
#
# Resolves Presentation.labelKey / Presentation.descriptionKey for every
# DiagnosticChannel entry shipped by core or vendor catalogs. Mirrors the
# layout of registry-resource.en.properties / registry-operation.en.properties.

registry-diagnostic.head-log.label=Head log
registry-diagnostic.head-log.description=Live tail of the Head process's structured Logback output. Operators subscribe by sub-category (core, library, boot) to triage runtime behavior; subscriptions exclude the substrate's own delivery-internal traces by default.
