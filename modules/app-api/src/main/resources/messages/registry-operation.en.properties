# i18n catalog for registry-operation primitive (per tempdoc 429 §E.16 + 434 §8).
# Served at GET /api/messages/registry-operation/en via MessageCatalogController.
# Loaded at test time by I18nKeyValidator (§A.7) to verify every Operation entry's
# i18n keys resolve.
#
# Convention: ops.<operation-id-without-namespace>.<field>
# Example: core.restart-worker → ops.restart-worker.{label,description,confirm}

# core.restart-worker
ops.restart-worker.label=Restart Worker
ops.restart-worker.description=Restart the indexing worker process; transient downtime expected.
ops.restart-worker.confirm=restart

# core.bulk-reindex
ops.bulk-reindex.label=Bulk Reindex Corpora
ops.bulk-reindex.description=Reindex one or more corpora from scratch; long-running.
ops.bulk-reindex.confirm=reindex

# Slice 447-followup §X.11.5 Phase 7: parameterless full-corpus rebuild wrapper.
# core.rebuild-index
ops.rebuild-index.label=Force Rebuild
ops.rebuild-index.description=Rebuild the entire watched-roots corpus from scratch; long-running.
ops.rebuild-index.confirm=rebuild

# core.ping-backend
ops.ping-backend.label=Ping Backend
ops.ping-backend.description=Health-check the local backend; fast.

# core.clear-failed-jobs (slice 429 follow-up; slice 3a-2-c admin-action precondition)
ops.clear-failed-jobs.label=Clear Failed Jobs
ops.clear-failed-jobs.description=Remove all permanently-failed indexing jobs from the worker queue. Inline-confirm; medium risk.

# core.index-gc (slice 484 §3.6 / observations.md `core.index-gc` closure; phantom Operation reference resolved)
ops.index-gc.label=Run Index GC
ops.index-gc.description=Prune marked or stale index generations. Args: {keepLatest?: integer (0=server default), pruneMarkedOnly?: boolean (default true)}. Returns {accepted, markedCount, prunedCount}. Inline-confirm; medium risk.

# core.reindex (slice 3a-1-2 closure; HealthView "Reindex Now" target)
ops.reindex.label=Reindex
ops.reindex.description=Lightweight incremental reindex of all watched roots. Args: {force?: boolean} (force=true bypasses mtime unchanged-detection). Distinct from bulk-reindex (blue/green migration); LOW risk; no confirm.

# core.reconcile-root (tempdoc 626 Recency; scoped recovery for the index.drift-unknown condition)
ops.reconcile-root.label=Verify Folder
ops.reconcile-root.description=Verify and reconcile a single watched folder against disk by its pathHash (re-prunes stale entries a live delete missed and re-checks the folder). Args: {pathHash: string}. Scoped recovery for an unverified folder — distinct from reindex (all roots). LOW risk; no confirm.

# core.export-diagnostics (slice 3a-1-2 closure; HealthView "Export Diagnostics" target)
ops.export-diagnostics.label=Export Diagnostics
ops.export-diagnostics.description=Generate a privacy-redacted diagnostics ZIP under AI Home (telemetry, crashes, runtime state). Returns the path; the bundle is local to the user's machine. LOW risk; no confirm.

# core.add-watched-root (slice 3a-2-c LibraryView Add Folder migration)
ops.add-watched-root.label=Add Watched Folder
ops.add-watched-root.description=Add a folder to the indexing roots. Args: {path: string, collection?: string}. The folder's contents are scheduled for indexing. LOW risk; no confirm.

# core.remove-watched-root (slice 3a-2-c LibraryView Remove Folder migration)
ops.remove-watched-root.label=Remove Watched Folder
ops.remove-watched-root.description=Stop watching a folder and delete its indexed documents from the Worker. Args: {path: string, collection?: string}. Returns deletedJobs count. MEDIUM risk; inline confirm.

# core.preview-excludes (slice 3a-2-c LibraryView Preview Excludes migration)
ops.preview-excludes.label=Preview Excludes
ops.preview-excludes.description=Walk every watched root and count, per pattern, how many already-indexed files would be deleted by the configured exclude globs. Read-only; no deletion. LOW risk; no confirm.

# core.apply-excludes (slice 3a-2-c LibraryView Apply Excludes migration)
ops.apply-excludes.label=Apply Excludes
ops.apply-excludes.description=Walk every watched root and delete already-indexed documents whose paths match the configured exclude globs. Worker-delegated deletion. DESTRUCTIVE. HIGH risk; typed confirm.
ops.apply-excludes.confirm=apply

# core.reload-inference (slice 3a-2-c BrainRuntimeSection Apply Runtime)
ops.reload-inference.label=Apply Runtime Settings
ops.reload-inference.description=Apply persisted settings (model path, context length, GPU layers) to the running inference runtime. Restarts llama-server only when already in ONLINE mode. MEDIUM risk; inline confirm.

# core.switch-inference-mode (slice 3a-2-c BrainRuntimeSection mode toggle)
ops.switch-inference-mode.label=Switch Inference Mode
ops.switch-inference-mode.description=Switch between ONLINE (Brain available) and INDEXING (background indexing only) modes. Args: {mode: "online" | "indexing"}. Returns post-switch current mode. MEDIUM risk; inline confirm.

# core.trigger-offline-processing (slice 3a-2-c BrainRuntime trigger)
ops.trigger-offline-processing.label=Run Offline Processing
ops.trigger-offline-processing.description=Dispatch the VDU + embeddings catch-up worker. Returns immediately after dispatch; processing runs on a virtual thread. LOW risk; idempotent.

# core.activate-runtime-variant (slice 3a-2-c BrainRuntime variant cluster)
ops.activate-runtime-variant.label=Activate Runtime Variant
ops.activate-runtime-variant.description=Begin activation of a GPU runtime variant (CUDA pack). Args: {variantId: string}. Returns the post-start activation status snapshot. Blocked when policy disables Online AI or GPU acceleration. MEDIUM risk; inline confirm.

# core.deactivate-runtime-variant (slice 3a-2-c BrainRuntime variant cluster)
ops.deactivate-runtime-variant.label=Deactivate Runtime Variant
ops.deactivate-runtime-variant.description=Begin deactivation of the currently-active runtime variant. Returns the post-start activation status snapshot. MEDIUM risk; inline confirm.

# core.preflight-ai-pack (slice 3a-2-c BrainPackImport preflight)
ops.preflight-ai-pack.label=Preflight AI Pack
ops.preflight-ai-pack.description=Validate a pack path against installed runtime + manifest constraints without mutating state. Args: {path: string}. Returns the preflight result map. LOW risk; no confirm.

# core.import-ai-pack (slice 3a-2-c BrainPackImport import)
ops.import-ai-pack.label=Import AI Pack
ops.import-ai-pack.description=Begin importing an AI pack. Returns the post-start import status (poll /api/ai/packs/status for progress). Args: {path: string, allowDowngrade?: boolean}. MEDIUM risk; inline confirm.

# core.start-ai-install (slice 3a-2-c BrainInstall start)
ops.start-ai-install.label=Start AI Install
ops.start-ai-install.description=Begin a fresh AI install. Args: {acceptTerms?: boolean}. Returns the post-start install status snapshot; install runs asynchronously. MEDIUM risk; inline confirm.

# core.cancel-ai-install (slice 3a-2-c BrainInstall cancel)
ops.cancel-ai-install.label=Cancel AI Install
ops.cancel-ai-install.description=Cancel a running AI install. Idempotent if no install is running. Returns the post-cancel install status snapshot. MEDIUM risk; inline confirm.

# core.repair-ai-install (slice 3a-2-c BrainInstall repair)
ops.repair-ai-install.label=Repair AI Install
ops.repair-ai-install.description=Re-run install steps to recover from a partial / corrupted state. Args: {acceptTerms?: boolean}. Returns the post-start install status snapshot. MEDIUM risk; inline confirm.

# core.create-user-policy (slice 3a-2-c BrainPackImport policy cluster)
ops.create-user-policy.label=Create User Policy
ops.create-user-policy.description=Create a fresh user policy file under AI Home if none exists. Rejects when a machine policy is present. Args: {manifestSha256: string}. MEDIUM risk; inline confirm.

# core.allowlist-add-digest (slice 3a-2-c BrainPackImport policy cluster)
ops.allowlist-add-digest.label=Add Digest to Allowlist
ops.allowlist-add-digest.description=Append a pack manifest digest to the existing user-policy allowlist. Preserves all other user-policy fields. Args: {manifestSha256: string}. Returns the post-update path + count. MEDIUM risk; inline confirm.

# core.reset-settings (slice 3a-2-c SettingsView reset)
ops.reset-settings.label=Reset Settings to Defaults
ops.reset-settings.description=Reset FE-controlled settings (theme, density, mode, defaultAction, pause-during-AI, exclude patterns, context window, max tokens, GPU layers, etc.) to canonical defaults. Preserves admin-set fields (server executable, model path, llama lib path, index base path). Returns the post-reset settings v2 shape. MEDIUM risk; inline confirm.

# core.remember (tempdoc 561 P-E — the agent's learning producer, READ_ONLY-ish -> LOW)
ops.remember.label=Remember
ops.remember.description=Persist a durable fact or user preference to long-term memory so it can be recalled in future conversations. Pass one concise sentence as 'content'. The user can inspect and forget remembered items in the Memory surface.
ops.remember.confirm=

# core.search-index (migrated from SearchTool, READ_ONLY -> LOW)
# Description prose preserved verbatim from SearchTool.description() to keep the
# LLM-facing tool surface bit-identical (per tempdoc 429 §C.G).
ops.search-index.label=Search Index
ops.search-index.description=Search the knowledge index. Supports keyword (text), semantic (vector), and hybrid modes. Use text for keyword matching; use hybrid for combined keyword + semantic; use vector for pure meaning-based search. Returns file paths, scores, and text excerpts. Use path_prefix to restrict to a specific folder (use paths from browse_folders results). Use browse_folders to explore folder structure before searching.
ops.search-index.confirm=

# core.browse-folders (migrated from BrowseTool, READ_ONLY -> LOW)
ops.browse-folders.label=Browse Folders
ops.browse-folders.description=Browse the indexed folder structure. Lists subfolders with file counts and sizes. When a folder has no subfolders, automatically lists individual files instead. Set list_files:true to explicitly list files in a folder. Call with no parent_path to see top-level indexed roots.
ops.browse-folders.confirm=

# core.ingest-files (migrated from IngestTool, WRITE -> MEDIUM)
ops.ingest-files.label=Ingest Files
ops.ingest-files.description=Ingest files into the knowledge index for searching. Accepts absolute or relative paths -- relative paths are resolved against indexed roots automatically. Folders are expanded recursively. You can pass paths like 'docs/file.md' without calling browse_folders first.
ops.ingest-files.confirm=ingest

# core.file-operations (migrated from FileOperationsTool, WRITE -> MEDIUM in tool; HIGH in catalog policy; supports undo)
ops.file-operations.label=File Operations
ops.file-operations.description=Execute file system operations (move, rename, copy, mkdir) within indexed folders. All operations are logged and can be undone. Paths must be absolute paths within user-configured indexed folders. Use browse_folders to discover indexed root paths.
ops.file-operations.confirm=execute

# Slice 445: TABULAR Resource item / collection / privacy-resolver Operations.
ops.cancel-indexing-job.label=Cancel indexing job
ops.cancel-indexing-job.description=Cancel an in-flight indexing job by its path hash. The worker resolves the hash and marks the row terminal with a CANCELLED outcome; the SSE stream emits an UPDATE delta. Args: {pathHash}. Item-level Operation on the core.indexing-jobs Resource.

ops.retry-indexing-job.label=Retry indexing job
ops.retry-indexing-job.description=Retry a permanently-failed indexing job by its path hash. The worker re-enqueues the row as PENDING and the loop will pick it up on the next sweep. Args: {pathHash}. Item-level Operation on the core.indexing-jobs Resource.

ops.resolve-path-hash.label=Resolve path hash
ops.resolve-path-hash.description=Resolve a SHA-256 path hash back to the absolute path the worker has on record. Substrate-routed equivalent of POST /api/library/resolve-hash; pinned by the Privacy.HASHED_REQUIRES_RESOLVER axis on Resources that hash paths at the wire boundary (ADR-0028).

# Slice 491 §9.D Phase E (C4 / E3) — agent navigation tool.
ops.navigate-to-surface.label=Navigate to surface
ops.navigate-to-surface.description=Activate a UI surface (a top-level workspace area like Library, Browse, Activity). Args: {surfaceId}. Dispatched as a Navigation Intent through BackendIntentRouter onto /api/intent/stream; the FE IntentRouter consumes the envelope and activates the surface. Used by the agent's tool palette as the structured complement to URL emission in chat text.
