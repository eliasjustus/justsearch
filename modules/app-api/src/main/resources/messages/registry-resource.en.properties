# i18n catalog for registry-resource primitive (per tempdoc 429 §E.16 + 434 §8).
# Served at GET /api/messages/registry-resource/en via MessageCatalogController.
#
# Tempdoc 430 Phase 2: presentation keys for the single Resource entry that
# surfaces the HealthEvent stream.

registry-resource.health-events.label = Health events
registry-resource.health-events.description = Stream of system health conditions and occurrences (lifecycle, conditions, thresholds).

# Slice 440: Runtime mode STATE Resource
registry-resource.runtime-context.label = Runtime context
registry-resource.runtime-context.description = Current head process runtime mode (system mode, automation flag).

# Slice 443: Server capabilities STATE Resource (handshake stream advertised as a Resource)
registry-resource.server-capabilities.label = Server capabilities
registry-resource.server-capabilities.description = Current server capability advertisement (registry primitives, schema versions, supported i18n locales).

# Tempdoc 560 WS7b: the Brain (inference runtime) as an OBSERVABLE registry participant.
registry-resource.inference-runtime.label = Inference runtime
registry-resource.inference-runtime.description = Current inference runtime capability (active model/variant, GPU/VRAM tier, per-model feature status).
registry-resource.ai-install.label = AI install
registry-resource.ai-install.description = Current AI model install progress (state, phase, downloaded bytes). A polled-state snapshot the Brain surface renders.
registry-resource.pack-import.label = Pack import
registry-resource.pack-import.description = Current AI pack import progress (state, phase). A polled-state snapshot the Brain surface renders.

# Slice 444b: Operation history HISTORY Resource
registry-resource.operation-history.label = Operation history
registry-resource.operation-history.description = Append-only log of recent Operation invocations (operation id, actor, outcome, timing).

# Slice 3a.1.4 / 3a.1.4b: TIMESERIES Resources (windowed numeric samples).
# Each metric Resource serves a TimeseriesSnapshot over /api/metrics/{name}
# (REST snapshot) and /api/metrics/{name}/stream (SSE updates). Metric Resources
# nest under a `metric.` prefix to distinguish them from STATE Resources.
registry-resource.metric.job-queue-depth.label = Job queue depth
registry-resource.metric.job-queue-depth.description = Number of jobs waiting in the worker indexing queue, sampled every 30s over a 30-minute window.
registry-resource.metric.documents-indexed-rate.label = Indexing rate
registry-resource.metric.documents-indexed-rate.description = Worker indexing throughput in documents per second, sampled every 30s over a 30-minute window.
registry-resource.metric.gpu-utilization.label = GPU utilization
registry-resource.metric.gpu-utilization.description = Head-side GPU compute utilization as a ratio (0.0-1.0), sampled every 30s over a 30-minute window.
registry-resource.metric.gpu-memory-utilization.label = GPU memory utilization
registry-resource.metric.gpu-memory-utilization.description = Head-side GPU memory utilization as a ratio (0.0-1.0), sampled every 30s over a 30-minute window.

# Slice 445: TABULAR Resource — collection-with-deltas wire shape.
registry-resource.indexing-jobs.label = Indexing jobs
registry-resource.indexing-jobs.description = Live view of the worker indexing queue: pending, in-flight, and recently failed jobs. Per-row item Operations support cancel and retry; path strings are SHA-256 hashed at the worker boundary and resolved on demand.

# Slice 3a.1.9 §B.B.D Stream A — Crash list as TABULAR × ONE_SHOT Resource.
registry-resource.failed-indexing-jobs.label = Failed indexing jobs
registry-resource.failed-indexing-jobs.description = Snapshot of jobs that have failed permanently after exhausting retry attempts. The collection-level "Clear All" Operation removes them from the worker queue. Paths are SHA-256 hashed at the worker boundary; resolve on demand for display.

# Slice 449 phase 7a — Library calibration TABULAR Resource (watched roots).
registry-resource.indexed-roots.label = Indexed roots
registry-resource.indexed-roots.description = Watched folders the indexer is tracking, with last-indexed timestamps and file counts. Paths are SHA-256 hashed at the head boundary and resolved on demand for display per ADR-0028.

# Tempdoc 580 §17.3 (Track C P2b) — the feedback outcome tier: two durable HISTORY Resources backing
# the one canonical observed-happening concept (feature snapshot + result disposition, joined by
# interactionId). Operator-observable internal feedback/training data (Role.DIAGNOSTIC).
registry-resource.search-trace-snapshot.label = Search feature snapshots
registry-resource.search-trace-snapshot.description = Durable per-query capture of the ranking features the engine computed (sparse/dense/splade/fused stage scores per hit), keyed by interaction id so a later result disposition can join back to what was ranked and why.
registry-resource.result-disposition.label = Result dispositions
registry-resource.result-disposition.description = Durable append-only log of what came of each ranked result (shown, opened, dwelled, cited, acted-on, refined-without-opening), fed by the search-UI and agentic-citation contributors into one canonical stream.
