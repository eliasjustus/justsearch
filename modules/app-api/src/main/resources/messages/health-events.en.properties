# i18n catalog for the HealthEvent Resource stream (per tempdoc 430 §A.7 + 434 §8).
# Served at GET /api/messages/health-events/en via MessageCatalogController.
#
# Per-ID key shape:
#   health-events.<id>.label       — short label (badges, lists)
#   health-events.<id>.message     — full sentence; ICU MessageFormat parameters allowed
#   health-events.<id>.remediation — optional what-to-do affordance
#   health-events.<id>.runbook     — optional URI per LSP Diagnostic.codeDescription
#
# Per-reason override (when the reason merits its own copy):
#   health-events.<id>.reason.<ReasonCode>.message
#
# Strings preserve visible parity with modules/ui-web/src/components/views/health/
# deriveHealthEvents.ts (Phase 9's verification target before that file is deleted).

# === Head =================================================================

health-events.api.unreachable.label = Backend unreachable
health-events.api.unreachable.message = The backend API is unreachable. The frontend cannot fetch live status updates.
health-events.api.unreachable.remediation = Check that the JustSearch process is running and the loopback port is reachable.

# === Worker (index lifecycle) =============================================

health-events.index.unavailable.label = Indexer unavailable
health-events.index.unavailable.message = The indexer is unavailable. Search and ingestion are paused until it recovers.
health-events.index.unavailable.reason.WorkerStarting.message = The Worker is starting up; the index will be available shortly.
health-events.index.unavailable.reason.WorkerCrashed.message = The Worker crashed and is restarting. Indexing will resume automatically.
health-events.index.unavailable.reason.IndexCorrupted.message = The search index appears corrupted. Rebuild it from the Health view to recover.
health-events.index.unavailable.runbook = docs/runbook/index-unavailable.md

health-events.index.start-error.label = Indexer failed to start
health-events.index.start-error.message = The indexer failed to start. See the embedded error detail for the failure cause.
health-events.index.start-error.runbook = docs/runbook/index-start-error.md

# === Worker (throughput) ===================================================

health-events.worker.throughput.stalled.label = Indexer throughput stalled
health-events.worker.throughput.stalled.message = Indexer throughput stalled with pending work in the queue.
health-events.worker.throughput.stalled.remediation = Check the Worker process for stuck threads or backpressure on downstream services (embedding, schema sync).

health-events.worker.throughput.degraded.label = Indexer throughput degraded
health-events.worker.throughput.degraded.message = Indexer throughput dropped below the healthy window.

# === Worker (schema) ======================================================

health-events.schema.rebuilding.label = Index rebuilding
health-events.schema.rebuilding.message = The index is rebuilding to align with the current schema. Search results may be incomplete until rebuild finishes.

health-events.schema.blocked.label = Index schema mismatch
health-events.schema.blocked.message = An index schema mismatch was detected; a reindex is required.
health-events.schema.blocked.reason.SchemaMismatch.message = The index schema differs from the configured fields catalog; a reindex is required.
health-events.schema.blocked.reason.SchemaLegacy.message = A legacy index format was detected; a reindex is required to upgrade.
health-events.schema.blocked.remediation = Trigger a reindex from the Health view or run `jseval run --reset` in dev environments.

health-events.schema.reindex-required.label = Reindex recommended
health-events.schema.reindex-required.message = A reindex is recommended to pick up recent schema or analyzer changes.

# === Index drift (tempdoc 626 §Axis-C) ====================================
# A watched root whose last reconcile could not verify index-vs-disk delete correspondence
# (the cap-skipped delete-detection scan). Surfaced so "couldn't verify" never reads as healthy.

health-events.index.drift-unknown.label = Index sync unverified
health-events.index.drift-unknown.message = A watched folder's deletions could not be verified — reindex to be sure.
health-events.index.drift-unknown.remediation = Reindex the affected folder to re-verify its contents.

# drift-corrected: a one-shot record that a reconcile pruned stale entries a live delete missed
# (drift found AND corrected — informational, the index is already correct).
health-events.index.drift-corrected.label = Index drift corrected
health-events.index.drift-corrected.message = A reconcile corrected a watched folder's index by pruning stale entries a live delete had missed.

# === Worker (embedding compatibility) =====================================

health-events.embedding.blocked.label = Embedding mismatch
health-events.embedding.blocked.message = An embedding model mismatch was detected; reindex recommended to align stored vectors.
health-events.embedding.blocked.reason.ModelMismatch.message = The active embedding model differs from the model used to populate the index. Reindex to align.
health-events.embedding.blocked.reason.ModelLegacy.message = The active embedding model is a legacy build; reindex with the current model is recommended.

# === Worker (queue DB) ====================================================

health-events.queue-db.unhealthy.label = Queue DB unhealthy
health-events.queue-db.unhealthy.message = The Worker queue database reports unhealthy state.
health-events.queue-db.unhealthy.reason.IntegrityFailed.message = The Worker queue database failed an integrity check; ingestion is paused.
health-events.queue-db.unhealthy.reason.DiskFull.message = The Worker queue database cannot grow because the disk is full. Free space and retry.
health-events.queue-db.unhealthy.runbook = docs/runbook/queue-db-unhealthy.md

health-events.queue-db.check-failed.label = Queue DB check failed
health-events.queue-db.check-failed.message = The most recent Worker queue-database integrity check failed.

# === Inference (AI) =======================================================

health-events.ai.not-ready.label = AI not ready
health-events.ai.not-ready.message = The AI subsystem is not ready. Online generation requests will be unavailable until it recovers.

health-events.ai.readiness-unknown.label = AI readiness unknown
health-events.ai.readiness-unknown.message = AI subsystem readiness is unknown — likely awaiting first probe response.

health-events.ai.not-configured.label = AI not configured
health-events.ai.not-configured.message = The AI subsystem is not configured. Configure a runtime in Settings to enable online generation.

# === Inference (embedding readiness) ======================================

health-events.embedding.not-ready.label = Embedding service unavailable
health-events.embedding.not-ready.message = The embedding service is unavailable. New documents will not gain vector coverage until it recovers.

health-events.embedding.readiness-unknown.label = Embedding readiness unknown
health-events.embedding.readiness-unknown.message = Embedding service readiness is unknown — likely awaiting first probe response.

health-events.embedding.not-configured.label = Embedding not configured
health-events.embedding.not-configured.message = The embedding service is not configured. Configure an embedding runtime in Settings to enable vector indexing.

# === Visual extraction ====================================================

health-events.ocr.unavailable.label = OCR unavailable
health-events.ocr.unavailable.message = OCR is unavailable for documents that still need baseline readable text.
health-events.ocr.unavailable.remediation = Install or repair the bundled Tesseract OCR runtime and English tessdata.

health-events.vdu.unavailable.label = Visual understanding unavailable
health-events.vdu.unavailable.message = Visual document understanding is unavailable for documents that still need visual processing.
health-events.vdu.unavailable.remediation = Start AI with a vision-capable model, enough VRAM, and a configured mmproj projector.

# === Telemetry ============================================================

health-events.telemetry.degraded.label = Telemetry degraded
health-events.telemetry.degraded.message = The telemetry subsystem is degraded — exports may be stale, failure rate elevated, or disk pressure rising.

# === GPU ==================================================================

health-events.gpu.saturated.label = GPU saturated
health-events.gpu.saturated.message = The GPU has been saturated above 80% utilization for an extended window with no active workload.
health-events.gpu.saturated.remediation = Check for runaway inference processes or unreleased CUDA contexts holding the device.

# === Memory ===============================================================

health-events.memory.pressure.label = Memory pressure
health-events.memory.pressure.message = JVM heap usage is above 90% ({usedMb} MB of {maxMb} MB used).
health-events.memory.pressure.remediation = Reduce concurrent batch sizes or restart the application if memory pressure persists.

# === Self-monitoring (tempdoc 600 C-2) ====================================
# A health check whose data source has no samples yet (e.g. just after start, or a metrics
# store still warming up). Surfaced so the product never silently implies "all clear" while a
# check is blind. Informational — not a fault; clears on its own when the data arrives.
health-events.monitor.unobservable.label = Self-check unavailable
health-events.monitor.unobservable.message = A self-check is temporarily unavailable.

# === Worker job lifecycle =================================================

health-events.worker.job.failed.label = Indexing job failed
health-events.worker.job.failed.message = An indexing job failed for {path}: {errorClass}.

health-events.worker.job.retry-scheduled.label = Retry scheduled
health-events.worker.job.retry-scheduled.message = A retry has been scheduled for the next failed job.

# === Worker supervised-recovery milestones (tempdoc 627) ==================

health-events.worker.restart-attempted.label = Knowledge server restarting
health-events.worker.restart-attempted.message = The knowledge server stopped responding and is being restarted.

health-events.worker.recovered.label = Knowledge server recovered
health-events.worker.recovered.message = The knowledge server recovered and is serving again.

# === App session recovery (tempdoc 627 N1) ================================
# The Head cannot observe its own crash in-life; a leftover runtime manifest with a dead PID is the
# successor signal that the previous session ended uncleanly. Wording is resilience-framed and does
# NOT claim data integrity — index verification is tempdoc 628's authority.

health-events.head.unclean-shutdown-recovered.label = App recovered from unclean shutdown
health-events.head.unclean-shutdown-recovered.message = JustSearch didn't shut down cleanly last time; it has resumed normally.

# === Agent session lifecycle ==============================================

health-events.agent.session.completed.label = Agent session completed
health-events.agent.session.completed.message = Agent session completed successfully.

health-events.agent.session.cancelled.label = Agent session cancelled
health-events.agent.session.cancelled.message = Agent session was cancelled by the user.

health-events.agent.session.budget-edge-finalize.label = Budget edge finalize
health-events.agent.session.budget-edge-finalize.message = Agent session reached its token budget edge and finalized early. Increase the budget or refine the request to continue.

health-events.agent.session.max-iterations.label = Max iterations reached
health-events.agent.session.max-iterations.message = Agent session reached the maximum iteration count without completing the task. Refine the request or raise the iteration limit.

health-events.agent.session.errored.label = Agent session errored
health-events.agent.session.errored.message = Agent session terminated due to an error. See logs for the underlying cause.
