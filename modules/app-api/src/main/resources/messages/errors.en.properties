# Error message catalog (English) — source of truth
#
# This file is the canonical English copy for every ApiErrorCode and
# AgentErrorCode enum value. The contents are loaded by ErrorCatalogController
# at boot and served via GET /api/error-catalog?locale=en. The frontend
# consumes the catalog via boot fetch and uses the i18nKey field
# ("errors.<CODE>") on each error envelope to look up the message.
#
# Encoding: UTF-8. Loaded via Properties.load(InputStreamReader(is, UTF_8)) so
# em-dashes and curly quotes are preserved. DO NOT use ISO-8859-1 escapes
# (\uXXXX) unless absolutely required for some downstream consumer.
#
# Contract:
#   - Every value of io.justsearch.app.api.ApiErrorCode must have a key
#     "errors.<NAME>" here.
#   - Every value of io.justsearch.agent.api.AgentErrorCode must have a key
#     "errors.<NAME>" here.
#   - INTERNAL_ERROR exists in both enums; one entry serves both.
#   - No orphan keys (keys that don't match any enum value).
# These three invariants are enforced by ErrorMessagePropertiesContractTest.
#
# Frontend consumes via /api/error-catalog (modules/ui-web/src/i18n/errorCatalog.ts).

# === ApiErrorCode — Index errors ============================================
errors.INDEX_DISK_FULL=The disk is full. Free up space and try again.
errors.INDEX_CORRUPT=The search index is corrupted. Rebuild it from the Health view.
errors.INDEX_LOCKED=The search index is locked by another process. Close other instances and try again.
errors.INDEX_SCHEMA_MISMATCH=The search index format is incompatible. A reindex is required.
errors.INDEX_BACKPRESSURE=The search index is overloaded. Please wait and try again.
errors.INDEX_ERROR=Index error. The search index may be corrupted.
errors.INDEX_UNAVAILABLE=The search index is not available.

