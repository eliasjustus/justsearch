# i18n catalog for the registry-workflow primitive (tempdoc 565 §27.4).
# Served at GET /api/messages/registry-workflow/en via MessageCatalogController.
#
# The run-window workflow picker projects GET /api/registry/workflows through the
# single display authority (present.ts `{kind:'workflow', labelKey}`); these keys
# are the authored labels it resolves. Without a backing entry the picker falls
# back to humanizeId(workflow id) — a degraded, non-translatable label.

# Tempdoc 565 §26 — the think -> confirm -> act demonstration workflow. Exercises all
# three node kinds (LlmStep, GateStep, ToolStep); needs the vendor.mcphost.* pack.
registry-workflow.demo-compose.label = Compose demo
registry-workflow.demo-compose.description = A think -> confirm -> act demonstration: the model proposes, a consent gate confirms, then an MCP tool acts and returns rich content.

# Tempdoc 565 §26.B/§26.C — the model-only think -> draft workflow. Two LlmSteps over the
# chat model, so it runs in any stack with the chat model loaded; its two labelled node
# segments are the visible proof of the run-structure authority.
registry-workflow.research-brief.label = Research brief
registry-workflow.research-brief.description = A two-step model-only run: pick a topic worth a brief, then draft a two-sentence research note on it.
