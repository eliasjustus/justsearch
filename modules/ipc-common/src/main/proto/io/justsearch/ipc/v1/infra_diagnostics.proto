syntax = "proto3";

package io.justsearch.ipc.v1;

option java_package = "io.justsearch.ipc.v1";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

message InfraHealthComponent {
  string component_id = 1;
  string status = 2;
  string reason_code = 3;
  google.protobuf.Struct metrics = 4;
}

message InfraHealthSnapshot {
  string status = 1;
  string generated_at = 2;
  repeated InfraHealthComponent components = 3;
  map<string, string> metadata = 4;
}

service InfraDiagnosticsService {
  rpc CurrentSnapshot(google.protobuf.Empty) returns (InfraHealthSnapshot);
  rpc StreamSnapshots(google.protobuf.Empty) returns (stream InfraHealthSnapshot);
}
