# ArchUnit configuration for JustSearch
# See: https://www.archunit.org/userguide/html/000_Index.html#_configuration

# Skip transitive classpath resolution — 10-60x speedup for large classpaths.
# Safe because all rules in this project check package membership / dependency
# direction, not external class metadata (annotations, interfaces).
resolveMissingDependenciesFromClassPath=false
