# CLA Assistant records one-time Contributor License Agreement signatures on
# pull requests. See CLA.md for the agreement and CONTRIBUTING.md for the
# contributor policy.
#
# The public repo keeps CLA canonical and also requires DCO. CLA signatures are
# stored on the cla-signatures branch at signatures/version1/cla.json. The
# workflow passes with the repository token today; PERSONAL_ACCESS_TOKEN remains
# accepted as a compatibility path for deployments that need a separate write
# token.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/eliasjustus/justsearch/blob/main/CLA.md'
          branch: 'cla-signatures'
          # Maintainer and bots never need to sign.
          allowlist: 'eliasjustus,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thank you for your pull request! Before we can merge it, please read our [Contributor License Agreement](https://github.com/eliasjustus/justsearch/blob/main/CLA.md) (you keep your copyright; it just keeps the project''s licensing options open) and sign it by posting exactly the comment below.'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
