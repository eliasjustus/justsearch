# PUBLIC CI - GitHub-hosted fact lanes for the open-source JustSearch repo.
#
# Public pull requests should get fast, owner-specific feedback. Keep each job
# named after the fact it proves because main branch protection requires these
# meaningful checks instead of one opaque Windows bucket.

name: CI

on:
  workflow_dispatch: {}
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  # Read-only Actions API access for the advisory `ci-walltime` job, which reads
  # this run's own job/step timings. Grantable on fork PRs (read scope). Tempdoc 668.
  actions: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.14.0"
  JAVA_VERSION: "25"

jobs:
  public-claims:
    name: Public claims
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            modules/ui-web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Workflow trigger policy guard
        run: node scripts/ci/check-workflow-triggers.mjs

      - name: Unit-test shard policy guard
        run: node scripts/ci/verify-unit-test-shard-policy.mjs

      - name: Test evidence policy guard
        run: node scripts/ci/verify-test-evidence-policy.mjs

      - name: Root README entrypoint guard
        run: node scripts/ci/check-root-readme.mjs

      - name: README benchmark numbers match the canonical release
        run: node scripts/ci/check-readme-benchmark-numbers.mjs

      - name: Verify frontend-stack claims
        run: node scripts/docs/check-frontend-stack-claims.mjs

      - name: Verify model-name freshness
        run: node scripts/docs/check-model-freshness.mjs

      - name: Verify privacy claims
        run: node scripts/docs/check-privacy-claims.mjs

      - name: Verify canonical docs links
        run: node scripts/docs/verify-canonical-doc-links.mjs

      - name: Verify module dependency doc is up to date
        run: node scripts/architecture/module-deps.mjs --check-canonical

      - name: Markdownlint canonical docs
        run: npx markdownlint "docs/explanation/**/*.md" "docs/reference/**/*.md" "docs/how-to/**/*.md" "docs/decisions/**/*.md"

      - name: Verify llms.txt is up to date
        run: node scripts/docs/llmstxt-generate.mjs --check

      - name: Verify synced skills are up to date
        run: node scripts/docs/skills-sync.mjs --check

  license-and-notices:
    name: License and notices
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: modules/ui-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix modules/ui-web

      - name: Enforce the license allowlist
        run: ./gradlew.bat checkLicense --no-configuration-cache --no-parallel

      - name: Dump Rust/Cargo licenses for the NOTICE projection
        run: node scripts/codegen/dump-cargo-licenses.mjs

      - name: Dump frontend npm licenses for the NOTICE projection
        shell: cmd
        run: |
          cd modules\ui-web
          npx --yes license-checker --production --json --relativeOnly > ..\..\build\npm-licenses.json

      - name: NOTICE / THIRD_PARTY_NOTICES are in sync
        run: node scripts/ci/check-notices-regen.mjs

  build:
    name: Build (no model blobs)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            modules/ui-web/package-lock.json

      - name: Assemble without model blobs
        run: ./gradlew.bat assemble -PskipWebBuild=false

  unit-tests:
    name: Unit tests (${{ matrix.lane }})
    # Per-lane runner OS (tempdoc 668 option B). app-ui is migrated to Linux (~2.8x
    # faster, validated); its Windows-specific tests are @Tag("windows") and run on
    # the separate windows-native-tests lane. search-worker / platform-contracts stay
    # on Windows pending their own Linux validation.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: app-ui
            os: ubuntu-latest
            artifact: unit-test-attribution-app-ui
            runner_label: ubuntu-latest/app-ui
            gradle_tasks: >-
              :modules:app-agent:test
              :modules:app-agent-api:test
              :modules:app-api:test
              :modules:app-api-tck:test
              :modules:app-config:test
              :modules:app-launcher:test
              :modules:app-observability:test
              :modules:app-services:test
              :modules:app-util:test
              :modules:ui:test
          - lane: search-worker
            os: windows-latest
            artifact: unit-test-attribution-search-worker
            runner_label: windows-latest/search-worker
            gradle_tasks: >-
              :modules:adapters-lucene:test
              :modules:configuration:test
              :modules:core:test
              :modules:core-contracts:test
              :modules:indexer-worker:test
              :modules:indexing:test
              :modules:ipc-common:test
              :modules:worker-core:test
              :modules:worker-services:test
          - lane: platform-contracts
            os: windows-latest
            artifact: unit-test-attribution-platform-contracts
            runner_label: windows-latest/platform-contracts
            gradle_tasks: >-
              :modules:ai-backend:test
              :modules:api-contract-projection-java:test
              :modules:app-inference:test
              :modules:benchmarks:test
              :modules:dead-code-audit:test
              :modules:extension-substrate:test
              :modules:gpu-bridge:test
              :modules:infra-core:test
              :modules:ort-common:test
              :modules:prompt-support:test
              :modules:reranker:test
              :modules:ssot-tools:test
              :modules:system-tests:test
              :modules:telemetry:test
              :modules:test-support:test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Unit tests with model-dependent tests self-skipping
        id: gradle-test
        shell: bash
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          GW='./gradlew'; [ "$RUNNER_OS" = "Windows" ] && GW='./gradlew.bat'
          "$GW" ${{ matrix.gradle_tasks }} -PskipWebBuild=true --console=plain

      - name: Report unit-test attribution
        if: always()
        run: node scripts/ci/report-unit-test-attribution.mjs --lane "${{ matrix.lane }}" --runner-label "${{ matrix.runner_label }}" --out-json build/ci/unit-test-attribution.json --out-md build/ci/unit-test-attribution.md --top 20 --allow-empty

      - name: Report unit-test advisory budget
        if: always()
        run: node scripts/ci/report-unit-test-budget.mjs --lane "${{ matrix.lane }}" --attribution build/ci/unit-test-attribution.json --out-json build/ci/unit-test-budget.json --out-md build/ci/unit-test-budget.md

      - name: Upload unit-test attribution
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/ci/unit-test-attribution.json
            build/ci/unit-test-attribution.md
            build/ci/unit-test-budget.json
            build/ci/unit-test-budget.md
            modules/**/build/test-results/test/TEST-*.xml
          if-no-files-found: warn

  # Tempdoc 668 option B — runs ONLY the @Tag("windows") tests (single-instance lock,
  # job objects, power status) on Windows, preserving coverage of genuinely Windows-
  # specific product behaviour that the Linux-migrated lanes (app-ui) skip. Small + fast
  # (a handful of classes via -PwindowsOnly). Covers the modules moved to Linux so far.
  windows-native-tests:
    name: Windows-native tests
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Windows-only tests (@Tag windows) for the Linux-migrated modules
        run: ./gradlew.bat :modules:app-util:test -PwindowsOnly=true --console=plain

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Advisory only — NOT a required check (see workflow-signal-policy.v1.json
  # requiredStatusChecks; do not add this job's name there). Runs after every
  # lane so it can read all sibling job/step timings and attribute the run's
  # wall-clock: which lane is the critical path, and how much of each lane is
  # fixed runner tax vs work. Warn-only budget; never fails the run. Tempdoc 668.
  ci-walltime:
    name: CI wall-clock attribution
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [public-claims, license-and-notices, build, unit-tests, secret-scan]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch this run's job timings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/ci
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs" --paginate > build/ci/run-jobs.json

      # Same-run cross-job download (needs no extra permission; the unit lanes are
      # in `needs`). Lets the attribution split each unit lane's opaque test step
      # into test CPU vs framework overhead. continue-on-error so a cancelled lane
      # (no artifact) degrades to "no breakdown" instead of failing this advisory job.
      - name: Download unit-test attributions (for the test-vs-overhead split)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: unit-test-attribution-*
          path: build/ci/unit-artifacts

      - name: Report wall-clock attribution
        run: node scripts/ci/report-ci-walltime-attribution.mjs --jobs-json build/ci/run-jobs.json --unit-attribution-dir build/ci/unit-artifacts --run-id "${{ github.run_id }}" --repository "${{ github.repository }}" --workflow "${{ github.workflow }}" --self-job "CI wall-clock attribution" --out-json build/ci/ci-walltime-attribution.json --out-md build/ci/ci-walltime-attribution.md

      - name: Report wall-clock advisory budget
        run: node scripts/ci/report-ci-walltime-budget.mjs --attribution build/ci/ci-walltime-attribution.json --out-json build/ci/ci-walltime-budget.json --out-md build/ci/ci-walltime-budget.md

      - name: Upload wall-clock attribution
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-walltime-attribution
          path: |
            build/ci/ci-walltime-attribution.json
            build/ci/ci-walltime-attribution.md
            build/ci/ci-walltime-budget.json
            build/ci/ci-walltime-budget.md
          if-no-files-found: warn
