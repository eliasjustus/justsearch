# PUBLIC CI — the GitHub-HOSTED LANE for the open-source JustSearch repo (Option C).
#
# Under Option C (radical transparency) the discipline-gate machinery IS published, so the public repo
# keeps running the gates — via a SPLIT, not a replacement:
#   • GPU/perf gates (eval, relevance-ratchet, model-loading) → a SELF-HOSTED runner, with REQUIRED
#     APPROVAL for fork-PR workflow runs (Settings → Actions → fork-PR approval) so a stranger's PR
#     cannot run code on your machine. Free GitHub-hosted runners have no GPU, so these can't move.
#   • Everything below (build + test + secret-scan + license-report + CLA/DCO + the no-GPU discipline
#     gates) → free GitHub-hosted runners, on every push/PR. This file is that hosted lane; the
#     internal `ci.yml` is ADAPTED for the GPU lane (the trees its gates read are now public).
#   • The handful of gates that read the private sidecar (docs/business/, docs/market-analysis/) are
#     made skip-when-absent (Option-C work program, item 2) since the sidecar isn't in the public repo.
#
# NOTE: the model .onnx blobs are NOT in the public repo (hosted externally) — that's fine: `build`
# does not stage models (the stageOnnxModels task is gated by -PincludeOnnxModels), and the
# model-loading tests are guarded (assumeTrue(Files.exists(...))) so they skip when models are absent.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest      # JustSearch is Windows-first; Tauri/NSIS + the Win build path
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Assemble (no model blobs required)
        run: ./gradlew.bat assemble -PskipWebBuild=false
      - name: Unit tests (model-dependent tests self-skip when blobs absent)
        run: ./gradlew.bat test
      # Tempdoc 632 — license gate + the NOTICE projection.
      # generateLicenseReport / checkLicense need these flags on this repo (jk1 3.1.4 + config-cache +
      # dependency-locking + cross-project resolution). The verification-metadata.xml now carries the
      # license-report POM checksums, so `-Dverification=lenient` is NOT needed.
      - name: Enforce the license allowlist (checkLicense)
        run: ./gradlew.bat checkLicense --no-configuration-cache --no-parallel
      - name: Dump Rust/Cargo (desktop shell) licenses for the NOTICE projection
        run: node scripts/codegen/dump-cargo-licenses.mjs
      - name: Dump frontend (npm) licenses for the NOTICE projection
        shell: cmd
        run: |
          cd modules\ui-web
          npx --yes license-checker --production --json --relativeOnly > ..\..\build\npm-licenses.json
      - name: NOTICE / THIRD_PARTY_NOTICES are in sync with their sources
        run: node scripts/ci/check-notices-regen.mjs
      - name: README benchmark numbers match the canonical release (tempdoc 633 #2)
        run: node scripts/ci/check-readme-benchmark-numbers.mjs

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history scan
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # the DCO check walks the PR/push commit range
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # CLA assistant handles the one-time contributor agreement; DCO remains the per-commit provenance check.
      - name: DCO sign-off trailers
        run: node scripts/ci/check-dco.mjs
