// Contract events ridden on /infra/capabilities/stream (slice 3a-1-8e).
//
// The substrate's runtime-continuous negotiation surface lives at the
// Resource layer: `/infra/capabilities/stream` (already a multi-frame SSE
// Resource via CapabilitiesChangeRegistry) carries mid-session contract
// evolution as typed events on the existing channel.
//
// Four discriminated event variants share one ContractEvent message:
//   - capability-registered    (LSP-style; new capability appears)
//   - capability-unregistered  (LSP-style; capability removed)
//   - catalog-membership-changed (Envoy delta-stream shape; first-party
//                                 catalogs evolving in bulk)
//   - reaction-outcome         (xDS-narrow; one-way observability emit
//                               from consumers reporting reaction status)
//
// `contract-version-changed` is intentionally absent. gRPC / protovalidate
// additive-by-construction makes patch + minor wire bumps non-breaking
// structurally; major bumps prohibited mid-session by slice 3a-1-8 Phase 6
// rule. No consumer reaction is needed to a wire-version bump beyond "the
// new validators apply to the next frame" (automatic). The wire-version
// remains reported statically once per session via
// serverCapabilities.contract_versions from the handshake (slice 3a-1-8
// Phase 6 ship state).
//
// AXIS 1 (shape): single-message-with-discriminator pattern per ADR-09a's
// "Future Agents Must Not" (no oneof for flat wire shapes; precedent =
// HealthEventBody in health.proto:42-90). The `kind` discriminator field
// carries NO closed-set constraint at the protovalidate enforcement layer
// (forward-compat for unknown variants).

syntax = "proto3";

package justsearch.wire.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

option java_package = "io.justsearch.contract.wire";
option java_multiple_files = true;

// Wire payload for a single contract event. Rides as the SseEnvelope.payload
// JSON-Struct on `/infra/capabilities/stream` UPDATE frames.
//
// Variant fields coexist at the top level; per-kind required-field
// invariants enforced via CEL.
message ContractEvent {
  // Discriminator. Free string at the enforcement layer per ADR-09a's
  // "Future Agents Must Not" (forward-compat for unknown variants).
  // Known values:
  //   - "capability-registered"
  //   - "capability-unregistered"
  //   - "catalog-membership-changed"
  //   - "reaction-outcome"
  // Consumers fall back to ignoring unknown kinds (substrate's LSP soft-fail
  // discipline; 50-decisions/04-backend-owned-truth.md).
  string kind = 1 [(buf.validate.field).string.min_len = 1];

  // capability-registered + capability-unregistered shared fields
  // capability_id is also reused by reaction-outcome to identify the subject
  // of the reaction.
  optional string capability_id = 2 [json_name = "capabilityId"];
  // Free-string type discriminator within the capability-registered family.
  // Known values: "resource", "operation", "surface" (slice 449); plugins
  // contribute additional types.
  optional string capability_type = 3 [json_name = "capabilityType"];

  // catalog-membership-changed fields
  optional string category = 4;
  repeated string added = 5;
  repeated string removed = 6;
  repeated string modified = 7;

  // reaction-outcome fields
  optional string consumer_id = 8 [json_name = "consumerId"];
  optional ReactionOutcome outcome = 9;
  optional string reason = 10;

  // Variant-specific attributes (per-kind opaque payload). For
  // capability-registered, plugins / first-party emitters carry the
  // capability's typed manifest payload here; for other kinds, reserved
  // for forward-compat. google.protobuf.Value preserves any JSON-shaped
  // value losslessly (mirrors HealthEventBody.attributes pattern).
  map<string, google.protobuf.Value> attributes = 11;

  // Per-kind required-field invariants.
  option (buf.validate.message).cel = {
    id: "contract_event.capability_registered_requires_fields",
    expression:
      "this.kind != 'capability-registered' || (has(this.capability_id) && has(this.capability_type))",
    message: "capability-registered requires capability_id and capability_type"
  };
  option (buf.validate.message).cel = {
    id: "contract_event.capability_unregistered_requires_fields",
    expression:
      "this.kind != 'capability-unregistered' || (has(this.capability_id) && has(this.capability_type))",
    message: "capability-unregistered requires capability_id and capability_type"
  };
  option (buf.validate.message).cel = {
    id: "contract_event.catalog_membership_changed_requires_category",
    expression:
      "this.kind != 'catalog-membership-changed' || has(this.category)",
    message: "catalog-membership-changed requires category"
  };
  option (buf.validate.message).cel = {
    id: "contract_event.reaction_outcome_requires_fields",
    expression:
      "this.kind != 'reaction-outcome' || (has(this.capability_id) && has(this.consumer_id) && has(this.outcome))",
    message: "reaction-outcome requires capability_id, consumer_id, outcome"
  };
}

// Outcome of a consumer's reaction to a contract event.
//
// No enum.defined_only constraint per ADR-09a §"Future Agents Must Not" —
// forward-compat for future outcome variants without breaking older consumers.
enum ReactionOutcome {
  REACTION_OUTCOME_UNSPECIFIED = 0;
  // Consumer integrated the capability change successfully.
  REACTION_OUTCOME_APPLIED = 1;
  // Consumer rejected the capability change (e.g., compat check failed,
  // type unknown to the consumer's dispatch table).
  REACTION_OUTCOME_REJECTED = 2;
  // Consumer applied the change with reduced functionality (e.g., catalog
  // refetch failed, consumer continues with stale cache).
  REACTION_OUTCOME_DEGRADED = 3;
}
