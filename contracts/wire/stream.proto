// Universal SSE envelope (slice 436) + StreamId value-type.
//
// Per slice 436 §B.2: every SSE frame across the framework's streams carries
// this envelope verbatim. Single JSON object as SSE `data:` payload; SSE
// event name is constant `"frame"`. Consumers route by `frame_kind` (and the
// lifecycle-subkind nested in the payload), not by SSE event name.

syntax = "proto3";

package justsearch.wire.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

option java_package = "io.justsearch.contract.wire";
option java_multiple_files = true;

message SseEnvelope {
  // Kind-prefixed slug identifying the source stream (e.g.,
  // "registry:capabilities"). Stable across reconnects.
  // Regex matches existing wire format (slice 436 §B.2).
  string stream_id = 1 [(buf.validate.field).string = {
    pattern: "^(registry|surface|system):[a-z][a-z0-9-]*$",
    min_len: 1
  }];
  // SseFrameKind carries no enum.defined_only constraint per ADR-09a
  // §"Future Agents Must Not" — forward-compat for future frame variants
  // beyond UPDATE / LIFECYCLE without breaking older consumers.
  SseFrameKind frame_kind = 2;
  // Monotonic per-stream sequence; starts at 1 on first frame after stream
  // registration. Gaps may occur across server restarts (FE detects via the
  // `reset` lifecycle).
  int64 seq = 3 [(buf.validate.field).int64.gte = 1];
  // ISO-8601 wall-clock timestamp on the wire.
  string ts = 4 [(buf.validate.field).string.min_len = 1];
  // Frame-specific payload. Untyped at the envelope level: UPDATE frames
  // carry the controller-defined wire shape; LIFECYCLE frames carry an
  // object with at minimum a `kind` field (connected/heartbeat/closing/
  // error/reset/snapshot).
  //
  // Phase 5a admits per-envelope contract version tagging via this payload's
  // optional `contract_version` field at the consumer's discretion (opt-in
  // capability per ADR-09 + ADR-09a).
  google.protobuf.Struct payload = 5;
  // Opaque server-encoded cursor. FE sends as `?since=<token>` on reconnect.
  // No min_len constraint: Java SseEnvelope:42 only requires non-null;
  // first-frame emitters may legitimately ship an empty token, and
  // protovalidate would reject those if min_len=1 were enforced.
  string resume_token = 6;
}

enum SseFrameKind {
  SSE_FRAME_KIND_UNSPECIFIED = 0;
  SSE_FRAME_KIND_UPDATE = 1;
  SSE_FRAME_KIND_LIFECYCLE = 2;
}
