// TimeseriesSnapshot + MetricRef + RenderHint (slice 3a-1-4 substrate).
//
// Wire shape mirrors the Java records exactly per ground-truth verification
// (slice 3a-1-8 §A.11.1 surfaced this; original Phase 2 stub had wrong fields).
//
// Source records:
//   modules/app-observability/.../metrics/TimeseriesSnapshot.java
//   modules/app-observability/.../metrics/MetricRef.java
//   modules/app-observability/.../metrics/RenderHint.java

syntax = "proto3";

package justsearch.wire.v1;

import "buf/validate/validate.proto";

option java_package = "io.justsearch.contract.wire";
option java_multiple_files = true;

// Sliding-window numeric metric (TIMESERIES Resource Category).
//
// Per slice 3a.1.4 §B.4: receiver semantics is "snapshot-of-window with regular
// cadence" — subscribers get the current N samples in one frame, not a stream
// of discrete events. Wire format is camelCase per ADR-08 §B.B + 3a.1.3 §B.B
// (FE-consumed records ship camelCase; snake_case only for debug-state records
// with class-level @JsonNaming). Per-field [json_name] preserves camelCase
// over proto3 JSON's default while keeping proto field names lower_snake_case
// per buf STANDARD lint.
message TimeseriesSnapshot {
  // OperationRef on Java side (@JsonValue → bare string on wire).
  // Matches the Resource registry entry's id. Multiplexed streams use this
  // to disambiguate.
  string resource_id = 1 [json_name = "resourceId", (buf.validate.field).string.min_len = 1];

  // Total window length in milliseconds.
  int64 window_ms = 2 [json_name = "windowMs", (buf.validate.field).int64.gte = 0];

  // Regular sample cadence in milliseconds (e.g. 30_000 for 30s samples).
  // The values array length is implicitly floor(windowMs / sampleIntervalMs).
  int64 sample_interval_ms = 3 [json_name = "sampleIntervalMs", (buf.validate.field).int64.gt = 0];

  // Free-form unit label ("count", "rate/s", "bytes", "%", etc.). V1 does not
  // enforce a vocabulary; FE renderers display verbatim.
  string unit = 4 [json_name = "unit"];

  // Sliding-window samples, ordered oldest-first.
  repeated double values = 5 [json_name = "values"];

  // Window boundary timestamps. Java emits Instant via DateMapping.asString
  // → ISO-8601 strings on the wire.
  string started_at = 6 [json_name = "startedAt", (buf.validate.field).string.min_len = 1];
  string ended_at = 7 [json_name = "endedAt", (buf.validate.field).string.min_len = 1];

  // Monotonic version counter for SSE clients to detect missed frames.
  // Matches the seq on the universal envelope per slice 436.
  int64 catalog_version = 8 [json_name = "catalogVersion"];
}

// Cross-link from a HealthEvent body (or other Resource entry) to a
// TIMESERIES Resource the FE should render alongside it.
//
// Per slice 3a.1.4 §B.9: body-level cross-links replace per-event-ID FE
// branching. Mirrors the recoveryOperationId cross-link precedent from slice
// 438. Wire format camelCase via [json_name].
message MetricRef {
  // OperationRef of the TIMESERIES Resource entry to render alongside the
  // parent event. Bare string on wire (Java @JsonValue).
  string resource_id = 1 [json_name = "resourceId", (buf.validate.field).string.min_len = 1];

  // Optional override for the rendered label. I18nKey on Java side; bare
  // string on wire. Omitted on null per Java's Optional<I18nKey>.
  optional string label = 2 [json_name = "label"];

  // Optional rendering shape. SPARK / GAUGE / HISTOGRAM. Default at consumer
  // site is SPARK.
  optional RenderHint hint = 3 [json_name = "hint"];
}

enum RenderHint {
  RENDER_HINT_UNSPECIFIED = 0;
  RENDER_HINT_SPARK = 1;
  RENDER_HINT_GAUGE = 2;
  RENDER_HINT_HISTOGRAM = 3;
}
