## 334: gte-base-en-v1.5 FP16 quality test — compare against Q4 Gemma baseline
dataset: scifact
modes: [lexical, bm25_splade, full]
embedding: true
splade: true
pipeline: true
# max_queries not set — run all queries
output_dir: tmp/eval-results

gpu:
  enabled: true
  embed:
    enabled: true
  splade:
    enabled: true
  ner:
    enabled: true

backend:
  clean: true

env:
  JUSTSEARCH_INDEX_SCHEMA_MISMATCH_POLICY: REINDEX
  JUSTSEARCH_EMBED_ONNX_MODEL_PATH: D:\code\JustSearch\models\onnx\gte-base-en-v1.5
